version: "3.9"
services:
  rowpic:
    build: .
    image: rowpic:latest
    container_name: rowpic
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - rowpic-cache:/app/backend/cache
      - ./photos:/photos:ro
    environment:
      ROWPIC_HOST: "0.0.0.0"
      ROWPIC_PORT: "8765"
      # Optional: allow scanning any path inside the container
      # ROWPIC_ALLOWED_ROOTS: '["/photos"]'

volumes:
  rowpic-cache:
